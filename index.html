<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#cc4514">

  <title>Priest Ledger - Kinetic Dark</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #000000;
      --card-top: #0a0a0a;
      --orange-grad-end: #cc4514;
      --orange-btn: linear-gradient(90deg, #ed5e21 0%, #d84511 100%);
      --text-main: #ffffff;
      --text-dim: #8e8e93;
      --income: #00D362; 
      --expense: #FF5A5F;
      --pending: #FFB340;
      --planned: #00E5FF;
      --txn-red: linear-gradient(90deg, #3a1616 0%, #111111 100%);
      --txn-green: linear-gradient(90deg, #163a20 0%, #111111 100%);
      --txn-yellow: linear-gradient(90deg, #3a2e16 0%, #111111 100%);
      --txn-cyan: linear-gradient(90deg, #003a40 0%, #111111 100%);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

    /* --- TOP HEADER CARD --- */
    .top-header { background: linear-gradient(180deg, var(--card-top) 50%, var(--orange-grad-end) 100%); border-radius: 0 0 45px 45px; padding: env(safe-area-inset-top, 40px) 20px 30px; position: relative; z-index: 10; box-shadow: 0 10px 40px rgba(204, 69, 20, 0.15); }
    
    .nav-top { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
    
    select.folder-select { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 20px; border-radius: 20px; font-weight: 700; font-size: 15px; appearance: none; text-align: center; cursor: pointer; max-width: 250px; width: 100%;}
    select.folder-select option { background: #111; color: #fff; }

    .balance-container { text-align: center; margin-bottom: 30px; }
    .balance-label { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
    .balance-amount { font-size: 52px; font-weight: 700; letter-spacing: -1.5px; font-variant-numeric: tabular-nums; transition: color 0.3s; }
    
    .pending-badge { display: inline-block; margin-top: 10px; background: rgba(255, 179, 64, 0.1); border: 1px solid rgba(255, 179, 64, 0.3); color: var(--pending); padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
    .pending-badge:active { transform: scale(0.95); }

    .action-bar { display: flex; justify-content: center; gap: 15px; align-items: center; padding: 0 10px; margin-bottom: -15px; }
    .action-circle-btn { width: 50px; height: 50px; border-radius: 50%; background: #ffffff; color: #000; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.2s;}
    .action-circle-btn:active { transform: scale(0.9); }
    .action-circle-btn.dark { background: rgba(30, 30, 30, 0.8); color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); font-weight: 800; font-size: 16px; }

    /* --- INPUT FORM --- */
    .form-container { padding: 40px 20px 20px; position: relative; z-index: 5; display: flex; flex-direction: column; gap: 12px; }
    
    .type-toggle { display: flex; background: #111; border-radius: 16px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
    .type-toggle input[type="radio"] { display: none; }
    .type-toggle label { flex: 1; text-align: center; padding: 12px 0; z-index: 1; font-size: 12px; font-weight: 700; color: var(--text-dim); cursor: pointer; transition: color 0.3s ease; }
    .toggle-slider { position: absolute; top: 4px; left: 4px; bottom: 4px; width: calc(25% - 4px); background: #222; border-radius: 12px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); z-index: 0; }
    
    #typeIncome:checked ~ .toggle-slider { transform: translateX(0); }
    #typeExpense:checked ~ .toggle-slider { transform: translateX(100%); }
    #typePending:checked ~ .toggle-slider { transform: translateX(200%); }
    #typePlanned:checked ~ .toggle-slider { transform: translateX(300%); }
    
    #typeIncome:checked ~ #lblIncome { color: var(--income); }
    #typeExpense:checked ~ #lblExpense { color: var(--expense); }
    #typePending:checked ~ #lblPending { color: var(--pending); }
    #typePlanned:checked ~ #lblPlanned { color: var(--planned); }

    .input-row { display: flex; gap: 10px; }
    .input-group { flex: 1; background: #111; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); padding: 10px 15px; display: flex; flex-direction: column; justify-content: center; }
    
    .label-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .input-group label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin: 0; }
    
    .input-group select, .input-group input { background: transparent; border: none; color: white; font-size: 16px; font-weight: 600; width: 100%; appearance: none; padding: 0;}
    .input-group select option { background: #111; color: white; }
    .input-group input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    
    .input-group input[type="checkbox"] { appearance: auto; width: 22px; height: 22px; cursor: pointer; accent-color: var(--planned); }

    .details-input { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 14px 15px; font-size: 15px; color: white; width: 100%; font-weight: 500; }
    .details-input::placeholder { color: rgba(255,255,255,0.3); }
    
    .btn-add { width: 100%; background: var(--orange-btn); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; box-shadow: 0 10px 20px rgba(216, 69, 17, 0.3); transition: transform 0.1s; cursor: pointer; }
    .btn-add:active { transform: scale(0.97); }
    .btn-cancel { background: #222; color: #fff; border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 14px; border-radius: 16px; font-weight: 600; margin-top: 5px; display: none; }

    /* --- PULSE ALERT CARD --- */
    .pulse-alert-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
    .pulse-card { background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; animation: pulseGlow 2s infinite; }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 5px rgba(0, 229, 255, 0.1); } 50% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); } 100% { box-shadow: 0 0 5px rgba(0, 229, 255, 0.1); } }

    /* --- TRANSACTIONS LIST --- */
    .transactions { padding: 10px 20px 40px; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .filter-input { background: #111; border: 1px solid rgba(255,255,255,0.05); color: white; padding: 12px 10px; border-radius: 12px; font-size: 13px; appearance: none; }
    .filter-input option { background: #111; color: white; }
    
    .txn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 16px; font-weight: 600; color: var(--text-dim); }

    .txn-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-radius: 20px; margin-bottom: 12px; background: #111; border: 1px solid rgba(255,255,255,0.03); }
    .txn-row.red-glow { background: var(--txn-red); }
    .txn-row.green-glow { background: var(--txn-green); }
    .txn-row.yellow-glow { background: var(--txn-yellow); }
    .txn-row.cyan-glow { background: var(--txn-cyan); }

    .txn-left { display: flex; align-items: center; gap: 16px; flex: 1; overflow: hidden; cursor: pointer; }
    .txn-icon { width: 44px; height: 44px; min-width: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; background: rgba(255,255,255,0.1); }
    .txn-details { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .txn-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-subtext { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.5); margin-left: 4px; }
    .txn-time { font-size: 12px; color: var(--text-dim); }

    .txn-right { text-align: right; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; margin-left: 10px; }
    .txn-amt { font-size: 15px; font-weight: 600; }
    .color-red { color: var(--expense); }
    .color-green { color: var(--income); }
    .color-yellow { color: var(--pending); }
    .color-cyan { color: var(--planned); }
    .txn-actions { display: flex; gap: 8px; margin-top: 4px; }
    .action-icon { font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 8px; cursor: pointer; color: white; border: none; }
    .action-btn-text { font-size: 11px; background: rgba(255,179,64,0.1); color: var(--pending); border: 1px solid rgba(255,179,64,0.3); padding: 4px 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .action-btn-text.cyan { background: rgba(0,229,255,0.1); color: var(--planned); border: 1px solid rgba(0,229,255,0.3); }

    /* --- OVERLAYS / MODALS --- */
    .overlay-backdrop { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
    .modal-card { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    
  </style>
</head>
<body>

  <div id="detailsOverlay" class="overlay-backdrop">
    <div class="modal-card" style="text-align: left;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <h3 id="modalCategory" style="margin:0; font-size:22px; color:white;">Category</h3>
        <span id="modalAmount" style="font-size: 20px; font-weight: 700;">₹0</span>
      </div>
      <div style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;" id="modalDate">Date</div>
      
      <label id="lblModalNotesTitle" style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Notes & Details</label>
      <div style="background: #222; padding: 15px; border-radius: 12px; color: white; font-size: 15px; line-height: 1.5; word-wrap: break-word; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05);" id="modalNotes">
        No notes provided.
      </div>
      
      <button class="btn-cancel" id="btnCloseModal" style="display: block; width: 100%; margin-top: 25px;" onclick="closeDetailsModal()">Close Details</button>
    </div>
  </div>

  <div class="top-header">
    <div class="nav-top">
      <select id="folderSelect" class="folder-select" onchange="handleFolderChange()">
        <option value="GENERAL" id="optGenLedger">General Ledger</option>
        <option value="NEW" id="optNewTrip">+ New Trip...</option>
      </select>
    </div>

    <div class="balance-container">
      <div class="balance-label" id="balanceLabel">Total Income</div>
      <div class="balance-amount" id="headerBalanceText">₹<span id="headerBalance">0</span></div>
      <div id="pendingBadge" class="pending-badge" onclick="document.getElementById('typePending').click()">
        <span id="txtPendingDuesBadge">⏳ Pending Dues:</span> ₹<span id="globalPending">0</span>
      </div>
    </div>

    <div class="action-bar">
      <div class="action-circle-btn dark" onclick="triggerTotalView()" title="Show All-Time">📜</div>
      <div class="action-circle-btn" onclick="shareCurrentTrip()" id="shareTripBtn" title="Beam Trip">📡</div>
      <div class="action-circle-btn dark" onclick="copyToWhatsApp()" title="Copy to WhatsApp">📋</div>
      <div class="action-circle-btn dark" onclick="toggleLanguage()" title="Switch Language" style="color:#ed5e21;">அ/A</div>
    </div>
  </div>

  <div class="form-container">
    <div class="type-toggle">
      <input type="radio" id="typeIncome" name="txnType" value="income" checked onchange="handleTypeChange()">
      <label for="typeIncome" id="lblIncome">Income</label>
      
      <input type="radio" id="typeExpense" name="txnType" value="expense" onchange="handleTypeChange()">
      <label for="typeExpense" id="lblExpense">Expense</label>

      <input type="radio" id="typePending" name="txnType" value="pending" onchange="handleTypeChange()">
      <label for="typePending" id="lblPending">Pending</label>
      
      <input type="radio" id="typePlanned" name="txnType" value="planned" onchange="handleTypeChange()">
      <label for="typePlanned" id="lblPlanned">Planned</label>

      <div class="toggle-slider"></div>
    </div>

    <div class="input-row">
      <div class="input-group" style="flex: 1.5;">
        <div class="label-header">
          <label id="lblCategory">Category</label>
          <span id="cancelCustomCat" style="display: none; color: var(--expense); font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase;" onclick="cancelCustomInput()">✕ Cancel</span>
        </div>
        
        <select id="categorySelect" onchange="triggerCustomCategory();"></select>
        <input type="text" id="customCategoryInput" placeholder="Type new category..." style="display: none;">
      </div>

      <div class="input-group">
        <div class="label-header"><label id="lblDate">Date</label></div>
        <input type="date" id="txnDate">
      </div>
    </div>

    <div class="input-row" id="recurringRow" style="display: none;">
      <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px; background: rgba(0,229,255,0.05); border-color: rgba(0,229,255,0.2);">
        <input type="checkbox" id="isRecurring">
        <label for="isRecurring" id="lblRecurring" style="font-size: 14px; color: white; margin: 0; text-transform: none; cursor: pointer; flex: 1;">Repeat Monthly</label>
      </div>
    </div>

    <div class="input-row">
      <div class="input-group" style="flex: 0.8;">
        <div class="label-header"><label id="lblMode">Mode</label></div>
        <select id="paymentModeSelect">
          <option value="Cash">Cash</option>
          <option value="GPay">GPay</option>
        </select>
      </div>
      <input type="text" id="detailsInput" class="details-input" placeholder="Add details or notes (optional)..." style="flex: 1.5;">
    </div>

    <div class="input-group" style="background: transparent; border: none; padding: 0;">
      <input type="number" id="amount" placeholder="₹ 0.00" inputmode="numeric" style="background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px; font-size: 24px; text-align: center;">
    </div>

    <button id="submitBtn" class="btn-add" onclick="saveTransaction()">Add Transaction</button>
    <button id="cancelBtn" class="btn-cancel" onclick="cancelEdit()">Cancel Edit</button>
  </div>

  <div class="transactions">
    
    <div id="pulseAlerts" class="pulse-alert-container"></div>

    <div class="filter-row">
      <input type="search" id="searchInput" class="filter-input" style="flex: 1;" placeholder="Search notes/mode..." oninput="refreshView()">
    </div>
    <div class="filter-row" style="margin-bottom: 20px;">
      <select id="filterCategory" class="filter-input" style="flex: 1.2;" onchange="refreshView()">
        <option value="ALL" id="optAllCat">All Categories</option>
      </select>
      <select id="filterMode" class="filter-input" style="flex: 1;" onchange="refreshView()">
        <option value="ALL" id="optAllModes">All Modes</option>
        <option value="Cash">Cash</option>
        <option value="GPay">GPay</option>
      </select>
      <input type="month" id="monthPicker" class="filter-input" style="flex: 1.2;" onchange="triggerMonthlyView()">
    </div>
    
    <div id="displayResult"></div>
  </div>

  <script>
    // --- LANGUAGE DICTIONARY ---
    const dict = {
      en: {
        lblIncome: "Income", lblExpense: "Expense", lblPending: "Pending", lblPlanned: "Planned", lblRecurring: "Repeat Monthly",
        lblCategory: "Category", lblDate: "Date", lblMode: "Mode",
        optGenLedger: "General Ledger", optNewTrip: "+ New Trip...", optAllCat: "All Categories", optAllModes: "All Modes",
        placeholderDetails: "Add details or notes (optional)...", placeholderSearch: "Search notes/mode...",
        btnAdd: "Add Transaction", btnUpdate: "Update Transaction", btnCancel: "Cancel Edit",
        lblModalNotesTitle: "Notes & Details", btnCloseModal: "Close Details", txtNoNotes: "No additional notes provided.",
        txtNoRecords: "No matching records found.", txtSum: "Sum", txtCopied: "Copied nicely for WhatsApp!",
        txtAllTime: "All-Time Report", txtReport: "Report", txtTotal: "Total", txtMonthly: "Monthly",
        txtPendingDuesBadge: "⏳ Pending Dues:", btnMarkPaid: "Mark Paid", txtMarkedPaid: "Marked as Paid!",
        txtOriginalDate: "(Original Date: ", btnPayNow: "Pay Now", txtExpensePaid: "Expense Paid!",
        txtDaysLeft: "Days Left", txtDueToday: "Due Today", txtOverdue: "Overdue!"
      },
      ta: {
        lblIncome: "வருமானம்", lblExpense: "செலவு", lblPending: "நிலுவை", lblPlanned: "திட்டமிட்டவை", lblRecurring: "மாதாந்திரம்",
        lblCategory: "வகை", lblDate: "தேதி", lblMode: "முறை",
        optGenLedger: "பொது கணக்கு", optNewTrip: "+ புதிய கணக்கு...", optAllCat: "அனைத்து வகைகள்", optAllModes: "அனைத்து முறைகள்",
        placeholderDetails: "விவரங்கள்/குறிப்புகள் (விரும்பினால்)...", placeholderSearch: "தேடுக...",
        btnAdd: "பரிவர்த்தனை சேர்", btnUpdate: "புதுப்பி", btnCancel: "ரத்து செய்",
        lblModalNotesTitle: "விவரங்கள்", btnCloseModal: "மூடு", txtNoNotes: "குறிப்புகள் எதுவும் இல்லை.",
        txtNoRecords: "பதிவுகள் எதுவும் இல்லை.", txtSum: "மொத்தம்", txtCopied: "வாட்ஸ்அப்பிற்கு நகலெடுக்கப்பட்டது!",
        txtAllTime: "முழு அறிக்கை", txtReport: "அறிக்கை", txtTotal: "மொத்த", txtMonthly: "மாத",
        txtPendingDuesBadge: "⏳ நிலுவைத் தொகை:", btnMarkPaid: "பெறப்பட்டது", txtMarkedPaid: "பணம் பெறப்பட்டது!",
        txtOriginalDate: "(பழைய தேதி: ", btnPayNow: "செலுத்து", txtExpensePaid: "செலுத்தப்பட்டது!",
        txtDaysLeft: "நாட்கள் மீதம்", txtDueToday: "இன்று தேதியாகும்", txtOverdue: "தாமதம்!"
      }
    };

    const catTranslate = {
      "Poojai": "பூஜை", "Homam": "ஹோமம்", "Purvam": "பூர்வம்", "Aparam": "அபரம்", "Laukikam": "லௌகீகம்", "Other Income": "மற்ற வருமானம்",
      "Travel": "பயணம்", "Pooja Materials": "பூஜை பொருட்கள்", "Dakshina Given": "தட்சணை", "Food/Meals": "உணவு", "Other Expense": "மற்ற செலவு"
    };

    let lang = localStorage.getItem('priestLang') || 'en';

    function getT(key) { return dict[lang][key]; }
    function getCatT(catName) { return (lang === 'ta' && catTranslate[catName]) ? catTranslate[catName] : catName; }

    function toggleLanguage() {
      lang = (lang === 'en') ? 'ta' : 'en';
      localStorage.setItem('priestLang', lang);
      applyLanguageUI();
    }

    function applyLanguageUI() {
      document.getElementById('lblIncome').innerText = getT('lblIncome');
      document.getElementById('lblExpense').innerText = getT('lblExpense');
      document.getElementById('lblPending').innerText = getT('lblPending');
      document.getElementById('lblPlanned').innerText = getT('lblPlanned');
      document.getElementById('lblRecurring').innerText = getT('lblRecurring');
      
      document.getElementById('lblCategory').innerText = getT('lblCategory');
      document.getElementById('lblDate').innerText = getT('lblDate');
      document.getElementById('lblMode').innerText = getT('lblMode');
      document.getElementById('optGenLedger').innerText = getT('optGenLedger');
      document.getElementById('optNewTrip').innerText = getT('optNewTrip');
      document.getElementById('optAllModes').innerText = getT('optAllModes');
      document.getElementById('txtPendingDuesBadge').innerText = getT('txtPendingDuesBadge');
      
      document.getElementById('detailsInput').placeholder = getT('placeholderDetails');
      document.getElementById('searchInput').placeholder = getT('placeholderSearch');
      
      document.getElementById('submitBtn').innerText = editingId ? getT('btnUpdate') : getT('btnAdd');
      document.getElementById('cancelBtn').innerText = getT('btnCancel');
      
      document.getElementById('lblModalNotesTitle').innerText = getT('lblModalNotesTitle');
      document.getElementById('btnCloseModal').innerText = getT('btnCloseModal');

      updateCategories();
      updateHeaderBalance();
      refreshView();
    }

    // --- STANDARD APP LOGIC ---
    const incomeCategories = ["Poojai", "Homam", "Purvam", "Aparam", "Laukikam", "Other Income"];
    const expenseCategories = ["Travel", "Pooja Materials", "Dakshina Given", "Food/Meals", "Other Expense"];
    const categoryIcons = { "Aparam": "🔥", "Homam": "🕉️", "Purvam": "✨", "Poojai": "🙏", "Laukikam": "💼", "Other Income": "💰", "Travel": "🚕", "Pooja Materials": "🌺", "Dakshina Given": "💸", "Food/Meals": "🍛", "Other Expense": "🧾" };

    let customIncomeCategories = JSON.parse(localStorage.getItem('customIncomeCategories')) || [];
    let customExpenseCategories = JSON.parse(localStorage.getItem('customExpenseCategories')) || [];

    let rawLedger = JSON.parse(localStorage.getItem('priestLedger')) || [];
    let ledger = rawLedger.map(entry => { if (!entry.paymentMode) entry.paymentMode = 'Cash'; return entry; });
    localStorage.setItem('priestLedger', JSON.stringify(ledger)); 

    let trips = JSON.parse(localStorage.getItem('priestTrips')) || [];
    let activeTripId = null; 
    let editingId = null;
    let currentViewType = 'all'; 

    document.getElementById('txnDate').valueAsDate = new Date();
    const now = new Date();
    document.getElementById('monthPicker').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    function initFolders() {
      const select = document.getElementById('folderSelect');
      while (select.options.length > 2) { select.remove(2); }
      trips.forEach(trip => {
        const opt = document.createElement('option');
        opt.value = trip.id;
        opt.textContent = `${trip.name}`;
        select.insertBefore(opt, select.lastElementChild);
      });
      select.value = activeTripId === null ? 'GENERAL' : activeTripId;
      document.getElementById('shareTripBtn').style.opacity = activeTripId ? '1' : '0.5';
      updateHeaderBalance();
    }

    function handleFolderChange() {
      const select = document.getElementById('folderSelect');
      if (select.value === 'NEW') {
        const tripName = prompt("Enter a name for the new trip:");
        if (tripName && tripName.trim() !== '') {
          const newTrip = { id: Date.now(), name: tripName.trim() };
          trips.push(newTrip);
          localStorage.setItem('priestTrips', JSON.stringify(trips));
          activeTripId = newTrip.id;
        } else {
          select.value = activeTripId === null ? 'GENERAL' : activeTripId;
          return;
        }
      } else {
        activeTripId = select.value === 'GENERAL' ? null : parseInt(select.value);
      }
      initFolders();
      refreshView();
    }

    function handleTypeChange() { 
      cancelCustomInput(); 
      updateCategories(); 
      document.getElementById('filterCategory').value = 'ALL'; 
      document.getElementById('filterMode').value = 'ALL';
      
      const type = document.querySelector('input[name="txnType"]:checked').value;
      const submitBtn = document.getElementById('submitBtn');
      const recurringRow = document.getElementById('recurringRow');
      
      // Show recurring option only for planned items
      recurringRow.style.display = (type === 'planned') ? 'flex' : 'none';
      
      if(type === 'pending' && !editingId) {
        submitBtn.style.background = 'var(--pending)';
        submitBtn.style.color = '#000';
      } else if (type === 'planned' && !editingId) {
        submitBtn.style.background = 'var(--planned)';
        submitBtn.style.color = '#000';
      } else if (!editingId) {
        submitBtn.style.background = 'var(--orange-btn)';
        submitBtn.style.color = 'white';
      }
      
      updateHeaderBalance();
      refreshView(); 
    }

    function updateCategories() {
      const type = document.querySelector('input[name="txnType"]:checked').value;
      const select = document.getElementById('categorySelect');
      const filterSelect = document.getElementById('filterCategory');
      
      select.innerHTML = '';
      filterSelect.innerHTML = `<option value="ALL">${getT('optAllCat')}</option>`;
      
      // If "Planned" is selected, we show Expense categories. 
      // If "Pending" is selected, we show Income categories.
      const baseOptions = (type === 'expense' || type === 'planned') ? expenseCategories : incomeCategories;
      const customOptions = (type === 'expense' || type === 'planned') ? customExpenseCategories : customIncomeCategories;
      const allOptions = [...baseOptions, ...customOptions];

      allOptions.forEach(cat => {
        const opt = document.createElement('option'); 
        opt.value = cat; opt.textContent = getCatT(cat); 
        select.appendChild(opt);

        const filterOpt = document.createElement('option');
        filterOpt.value = cat; filterOpt.textContent = getCatT(cat);
        filterSelect.appendChild(filterOpt);
      });

      const addOpt = document.createElement('option');
      addOpt.value = "ADD_NEW_CUSTOM_CAT";
      addOpt.textContent = lang === 'ta' ? "➕ தனிப்பயன் சேர்..." : "➕ Add Custom...";
      addOpt.style.color = "#ed5e21"; 
      select.appendChild(addOpt);
    }

    function triggerCustomCategory() {
      const select = document.getElementById('categorySelect');
      const input = document.getElementById('customCategoryInput');
      const cancelBtn = document.getElementById('cancelCustomCat');
      if (select.value === 'ADD_NEW_CUSTOM_CAT') {
        select.style.display = 'none'; input.style.display = 'block'; cancelBtn.style.display = 'block';
        input.value = ''; input.focus();    
      }
    }

    function cancelCustomInput() {
      const select = document.getElementById('categorySelect');
      const input = document.getElementById('customCategoryInput');
      const cancelBtn = document.getElementById('cancelCustomCat');
      input.style.display = 'none'; cancelBtn.style.display = 'none'; select.style.display = 'block'; select.selectedIndex = 0; 
    }

    function saveTransaction() {
      const amount = parseFloat(document.getElementById('amount').value);
      const date = document.getElementById('txnDate').value;
      const type = document.querySelector('input[name="txnType"]:checked').value;
      const paymentMode = document.getElementById('paymentModeSelect').value;
      const isRecurring = document.getElementById('isRecurring').checked;
      
      let finalCategory = '';
      const customInput = document.getElementById('customCategoryInput');
      const detailsText = document.getElementById('detailsInput').value.trim();

      if (isNaN(amount) || amount <= 0) { showToast("Enter a valid amount"); return; }

      if (customInput.style.display === 'block') {
        finalCategory = customInput.value.trim();
        if (!finalCategory) { showToast("Please type a category name"); return; }
        if (type !== 'expense' && type !== 'planned') {
          if (!incomeCategories.includes(finalCategory) && !customIncomeCategories.includes(finalCategory)) {
            customIncomeCategories.push(finalCategory); localStorage.setItem('customIncomeCategories', JSON.stringify(customIncomeCategories));
          }
        } else {
          if (!expenseCategories.includes(finalCategory) && !customExpenseCategories.includes(finalCategory)) {
            customExpenseCategories.push(finalCategory); localStorage.setItem('customExpenseCategories', JSON.stringify(customExpenseCategories));
          }
        }
      } else {
        finalCategory = document.getElementById('categorySelect').value;
        if (finalCategory === 'ADD_NEW_CUSTOM_CAT') return; 
      }

      if (editingId) {
        const index = ledger.findIndex(e => e.id === editingId);
        if (index > -1) ledger[index] = { id: editingId, tripId: activeTripId, type, category: finalCategory, details: detailsText, amount, date, paymentMode, isRecurring };
        cancelEdit(); 
      } else {
        ledger.push({ id: Date.now(), tripId: activeTripId, type, category: finalCategory, details: detailsText, amount, date, paymentMode, isRecurring });
      }

      localStorage.setItem('priestLedger', JSON.stringify(ledger));
      showToast(editingId ? "Updated" : "Saved");
      
      document.getElementById('amount').value = ''; document.getElementById('detailsInput').value = ''; 
      document.getElementById('paymentModeSelect').value = 'Cash'; 
      document.getElementById('isRecurring').checked = false;
      cancelCustomInput(); updateCategories(); updateHeaderBalance(); refreshView();
    }

    function editTransaction(id) {
      const entry = ledger.find(e => e.id === id);
      if (!entry) return;
      document.querySelector(`input[name="txnType"][value="${entry.type}"]`).checked = true;
      handleTypeChange(); 
      
      document.getElementById('categorySelect').value = entry.category;
      document.getElementById('amount').value = entry.amount;
      document.getElementById('txnDate').value = entry.date;
      document.getElementById('detailsInput').value = entry.details || '';
      document.getElementById('paymentModeSelect').value = entry.paymentMode || 'Cash';
      document.getElementById('isRecurring').checked = entry.isRecurring || false;
      editingId = id;
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.textContent = getT('btnUpdate');
      submitBtn.style.background = 'var(--orange-btn)';
      submitBtn.style.color = 'white';
      document.getElementById('cancelBtn').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('amount').value = ''; document.getElementById('detailsInput').value = ''; 
      document.getElementById('txnDate').valueAsDate = new Date(); document.getElementById('paymentModeSelect').value = 'Cash';
      document.getElementById('isRecurring').checked = false;
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.textContent = getT('btnAdd');
      handleTypeChange(); 
      
      document.getElementById('cancelBtn').style.display = 'none';
      cancelCustomInput(); 
    }

    function deleteTransaction(id) {
      if (confirm("Delete?")) {
        ledger = ledger.filter(e => e.id !== id); localStorage.setItem('priestLedger', JSON.stringify(ledger));
        if (editingId === id) cancelEdit(); updateHeaderBalance(); refreshView();
      }
    }

    // --- PENDING TO INCOME LOGIC ---
    function markAsPaid(id) {
      const entry = ledger.find(e => e.id === id);
      if (!entry) return;
      
      const d = new Date();
      const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      const oldDateObj = new Date(entry.date);
      const oldDateStr = oldDateObj.toLocaleDateString(lang==='ta'?'ta-IN':'en-US', { month: 'short', day: 'numeric' });
      
      entry.type = 'income';
      entry.date = todayStr;
      
      const historyNote = `${getT('txtOriginalDate')}${oldDateStr})`;
      entry.details = entry.details ? `${entry.details} ${historyNote}` : historyNote;
      
      localStorage.setItem('priestLedger', JSON.stringify(ledger));
      showToast(getT('txtMarkedPaid'));
      document.getElementById('typeIncome').click();
    }

    // --- PLANNED TO EXPENSE LOGIC (CLONE & KEEP) ---
    function payPlanned(id) {
      const entryIndex = ledger.findIndex(e => e.id === id);
      if (entryIndex === -1) return;
      const entry = ledger[entryIndex];
      
      const d = new Date();
      const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      const oldDateObj = new Date(entry.date);
      const oldDateStr = oldDateObj.toLocaleDateString(lang==='ta'?'ta-IN':'en-US', { month: 'short', day: 'numeric' });
      const historyNote = `${getT('txtOriginalDate')}${oldDateStr})`;

      if (entry.isRecurring) {
        const newExpense = { ...entry, id: Date.now() + Math.random(), type: 'expense', date: todayStr, isRecurring: false };
        newExpense.details = newExpense.details ? `${newExpense.details} ${historyNote}` : historyNote;
        ledger.push(newExpense);
        
        const nextDate = new Date(entry.date);
        nextDate.setMonth(nextDate.getMonth() + 1);
        entry.date = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}-${String(nextDate.getDate()).padStart(2, '0')}`;
      } else {
        entry.type = 'expense';
        entry.date = todayStr;
        entry.details = entry.details ? `${entry.details} ${historyNote}` : historyNote;
      }
      
      localStorage.setItem('priestLedger', JSON.stringify(ledger));
      showToast(getT('txtExpensePaid'));
      document.getElementById('typeExpense').click();
    }

    // --- PULSE ALERT ENGINE ---
    function checkPlannedAlerts() {
      const alertsContainer = document.getElementById('pulseAlerts');
      alertsContainer.innerHTML = '';
      alertsContainer.style.display = 'none'; 

      // NEW: Only run the pulse alert logic if the user is on the Income or Expense tab
      const activeType = document.querySelector('input[name="txnType"]:checked').value;
      if (activeType !== 'income' && activeType !== 'expense') return;

      let plannedEntries = ledger.filter(e => e.tripId === activeTripId && e.type === 'planned');
      if (plannedEntries.length === 0) return;

      const today = new Date();
      today.setHours(0,0,0,0);
      
      let hasAlerts = false;

      plannedEntries.forEach(entry => {
        const dueDate = new Date(entry.date);
        dueDate.setHours(0,0,0,0);
        
        const diffTime = dueDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays <= 3) {
          hasAlerts = true;
          let timeText = '';
          if(diffDays > 0) timeText = `🔥 ${diffDays} ${getT('txtDaysLeft')}`;
          else if (diffDays === 0) timeText = `🚨 ${getT('txtDueToday')}`;
          else timeText = `⚠️ ${getT('txtOverdue')}`;
          
          const recIcon = entry.isRecurring ? '🔄 ' : '🗓️ ';
          const detailsHtml = entry.details ? `<div style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; font-style: italic;">"${entry.details}"</div>` : '';
          
          const card = document.createElement('div');
          card.className = 'pulse-card';
          card.innerHTML = `
            <div style="flex: 1; padding-right: 10px;">
              <div style="font-size: 14px; font-weight: 700; color: white;">${recIcon}${getCatT(entry.category)} • ₹${entry.amount.toLocaleString('en-IN')}</div>
              ${detailsHtml}
              <div style="font-size: 12px; color: var(--planned); margin-top: 6px; font-weight: 600;">${timeText}</div>
            </div>
            <button class="action-btn-text cyan" style="white-space: nowrap;" onclick="payPlanned(${entry.id})">💳 ${getT('btnPayNow')}</button>
          `;
          alertsContainer.appendChild(card);
        }
      });

      if(hasAlerts) alertsContainer.style.display = 'flex';
    }

    function showDetailsModal(id) {
      const entry = ledger.find(e => e.id === id); if (!entry) return;
      const isIncome = entry.type === 'income';
      const isPending = entry.type === 'pending';
      const isPlanned = entry.type === 'planned';
      
      document.getElementById('modalCategory').innerText = getCatT(entry.category);
      const amtElem = document.getElementById('modalAmount');
      
      let prefix = '-';
      if(isIncome) prefix = '+';
      if(isPending) prefix = '⏳';
      if(isPlanned) prefix = '🗓️';

      amtElem.innerText = `${prefix}₹${entry.amount.toLocaleString('en-IN')}`;
      
      if(isPending) amtElem.className = 'color-yellow';
      else if(isPlanned) amtElem.className = 'color-cyan';
      else amtElem.className = isIncome ? 'color-green' : 'color-red';
      
      const dateStr = new Date(entry.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      let dateHtml = `${dateStr} &bull; <strong style="color:white;">${entry.paymentMode || 'Cash'}</strong>`;
      if(entry.isRecurring) dateHtml += ` &bull; <strong style="color:var(--planned);">🔄 ${getT('lblRecurring')}</strong>`;

      document.getElementById('modalDate').innerHTML = dateHtml;
      
      const notesElem = document.getElementById('modalNotes');
      if (entry.details) { notesElem.innerText = entry.details; notesElem.style.color = "white"; notesElem.style.fontStyle = "normal"; } 
      else { notesElem.innerText = getT('txtNoNotes'); notesElem.style.color = "var(--text-dim)"; notesElem.style.fontStyle = "italic"; }
      document.getElementById('detailsOverlay').style.display = 'flex';
    }

    function closeDetailsModal() { document.getElementById('detailsOverlay').style.display = 'none'; }

    function copyToWhatsApp() {
      const activeType = document.querySelector('input[name="txnType"]:checked').value;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filterCat = document.getElementById('filterCategory').value;
      const filterMode = document.getElementById('filterMode').value;
      
      let displayEntries = ledger.filter(e => e.tripId === activeTripId && e.type === activeType);
      if (filterCat !== 'ALL') displayEntries = displayEntries.filter(e => e.category === filterCat);
      if (filterMode !== 'ALL') displayEntries = displayEntries.filter(e => e.paymentMode === filterMode);
      if (searchTerm) {
        displayEntries = displayEntries.filter(e => getCatT(e.category).toLowerCase().includes(searchTerm) || (e.details && e.details.toLowerCase().includes(searchTerm)) || e.amount.toString().includes(searchTerm) || (e.paymentMode && e.paymentMode.toLowerCase().includes(searchTerm)) || e.date.includes(searchTerm));
      }
      if (currentViewType === 'monthly') {
        const selMonth = document.getElementById('monthPicker').value;
        if (selMonth) { const [year, month] = selMonth.split('-'); displayEntries = displayEntries.filter(e => { const d = new Date(e.date); return d.getMonth() + 1 === parseInt(month) && d.getFullYear() === parseInt(year); }); }
      }
      if (displayEntries.length === 0) { showToast(getT('txtNoRecords')); return; }
      displayEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      const tripName = activeTripId ? trips.find(t => t.id === activeTripId).name : getT('optGenLedger');
      const viewLabel = currentViewType === 'monthly' ? new Date(document.getElementById('monthPicker').value).toLocaleDateString(lang==='ta'?'ta-IN':'en-US', { month: 'long', year: 'numeric' }) : getT('txtAllTime');
      
      let typeLabel = '';
      if(activeType === 'income') typeLabel = `🟢 *${getT('lblIncome').toUpperCase()}*`;
      else if (activeType === 'expense') typeLabel = `🔴 *${getT('lblExpense').toUpperCase()}*`;
      else if (activeType === 'pending') typeLabel = `🟡 *${getT('lblPending').toUpperCase()}*`;
      else typeLabel = `🗓️ *${getT('lblPlanned').toUpperCase()}*`;
      
      let total = 0; let textToCopy = `*Ledger:* ${tripName}\n*Period:* ${viewLabel}\n${typeLabel}\n\n`;
      displayEntries.forEach(e => {
        total += e.amount;
        const dateStr = new Date(e.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const noteStr = e.details ? `\n   ↳ _${e.details}_` : '';
        const modeStr = e.paymentMode ? ` (${e.paymentMode})` : '';
        const recStr = e.isRecurring ? ` 🔄` : '';
        textToCopy += `• ${dateStr} | *${getCatT(e.category)}*${modeStr}${recStr} | ₹${e.amount.toLocaleString('en-IN')}${noteStr}\n`;
      });
      textToCopy += `\n*TOTAL: ₹${total.toLocaleString('en-IN')}*`;
      
      if (navigator.clipboard) { navigator.clipboard.writeText(textToCopy).then(() => showToast(getT('txtCopied'))).catch(err => showToast("Failed.")); } 
      else { showToast("Clipboard not supported."); }
    }

    function updateHeaderBalance() {
      const activeType = document.querySelector('input[name="txnType"]:checked').value;
      
      let globalPendingTotal = 0;
      ledger.filter(e => e.tripId === activeTripId && e.type === 'pending').forEach(e => globalPendingTotal += e.amount);
      document.getElementById('globalPending').innerText = globalPendingTotal.toLocaleString('en-IN');
      
      // Hide badge on Pending/Planned views to avoid confusion
      document.getElementById('pendingBadge').style.display = (activeType === 'pending' || activeType === 'planned') ? 'none' : 'inline-block';

      let contextEntries = ledger.filter(e => e.tripId === activeTripId && e.type === activeType);
      if (currentViewType === 'monthly') {
        const selMonth = document.getElementById('monthPicker').value;
        if (selMonth) { const [y, m] = selMonth.split('-'); contextEntries = contextEntries.filter(e => { const d = new Date(e.date); return d.getMonth() + 1 === parseInt(m) && d.getFullYear() === parseInt(y); }); }
      }
      
      let total = 0; contextEntries.forEach(e => total += e.amount);
      document.getElementById('headerBalance').innerText = total.toLocaleString('en-IN');
      
      const balanceLabel = document.getElementById('balanceLabel');
      const balanceText = document.getElementById('headerBalanceText');
      const viewStr = currentViewType === 'monthly' ? getT('txtMonthly') : getT('txtTotal');
      
      if (activeType === 'income') {
        balanceLabel.innerText = `${viewStr} ${getT('lblIncome')}`; balanceText.style.color = 'var(--income)';
      } else if (activeType === 'expense') {
        balanceLabel.innerText = `${viewStr} ${getT('lblExpense')}`; balanceText.style.color = 'var(--expense)';
      } else if (activeType === 'pending') {
        balanceLabel.innerText = `${viewStr} ${getT('lblPending')}`; balanceText.style.color = 'var(--pending)';
      } else {
        balanceLabel.innerText = `${viewStr} ${getT('lblPlanned')}`; balanceText.style.color = 'var(--planned)';
      }
    }

    function renderTable(entriesToFilter, titleText) {
      const resultBox = document.getElementById('displayResult');
      const activeType = document.querySelector('input[name="txnType"]:checked').value;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filterCat = document.getElementById('filterCategory').value;
      const filterMode = document.getElementById('filterMode').value;
      
      let displayEntries = entriesToFilter.filter(e => e.tripId === activeTripId && e.type === activeType);
      
      if (filterCat !== 'ALL') displayEntries = displayEntries.filter(e => e.category === filterCat);
      if (filterMode !== 'ALL') displayEntries = displayEntries.filter(e => e.paymentMode === filterMode);
      if (searchTerm) {
        displayEntries = displayEntries.filter(e => getCatT(e.category).toLowerCase().includes(searchTerm) || (e.details && e.details.toLowerCase().includes(searchTerm)) || e.amount.toString().includes(searchTerm) || (e.paymentMode && e.paymentMode.toLowerCase().includes(searchTerm)) || e.date.includes(searchTerm));
      }

      let dynamicTotal = 0; displayEntries.forEach(e => dynamicTotal += e.amount);
      
      let totalColor = 'var(--income)';
      if(activeType === 'expense') totalColor = 'var(--expense)';
      if(activeType === 'pending') totalColor = 'var(--pending)';
      if(activeType === 'planned') totalColor = 'var(--planned)';
      
      let html = `
      <div class="txn-header" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <div><span>${titleText}</span> <span style="font-size:12px; font-weight:400; color:var(--text-dim);">(${displayEntries.length})</span></div>
        <div style="color:${totalColor}; font-weight:700; font-size: 15px;">${getT('txtSum')}: ₹${dynamicTotal.toLocaleString('en-IN')}</div>
      </div>`;

      if (displayEntries.length === 0) {
        html += `<div style="text-align:center; padding:30px 0; color:var(--text-dim);">${getT('txtNoRecords')}</div>`;
      } else {
        displayEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
        displayEntries.forEach(entry => {
          const isInc = entry.type === 'income';
          const isPending = entry.type === 'pending';
          const isPlanned = entry.type === 'planned';
          
          let rowClass = 'red-glow'; let amtColor = 'color-red'; let sign = '-';
          if(isInc) { rowClass = 'green-glow'; amtColor = 'color-green'; sign = '+'; }
          if(isPending) { rowClass = 'yellow-glow'; amtColor = 'color-yellow'; sign = '⏳'; }
          if(isPlanned) { rowClass = 'cyan-glow'; amtColor = 'color-cyan'; sign = '🗓️'; }
          
          const dateStr = new Date(entry.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          const icon = categoryIcons[entry.category] || "🔹";
          const detailsHtml = entry.details ? `<span class="txn-subtext">• ${entry.details}</span>` : '';
          const recHtml = entry.isRecurring ? `<span class="txn-subtext" style="color:var(--planned);">🔄</span>` : '';
          
          let actionButtons = '';
          if(isPending) {
             actionButtons += `<button class="action-btn-text" onclick="markAsPaid(${entry.id})">💰 ${getT('btnMarkPaid')}</button>`;
          }
          if(isPlanned) {
             actionButtons += `<button class="action-btn-text cyan" onclick="payPlanned(${entry.id})">💳 ${getT('btnPayNow')}</button>`;
          }
          actionButtons += `<button class="action-icon" onclick="editTransaction(${entry.id})">✎</button><button class="action-icon" onclick="deleteTransaction(${entry.id})">✕</button>`;

          html += `
          <div class="txn-row ${rowClass}">
            <div class="txn-left" onclick="showDetailsModal(${entry.id})" title="View Details">
              <div class="txn-icon">${icon}</div>
              <div class="txn-details">
                <div class="txn-name">${getCatT(entry.category)}${recHtml}${detailsHtml}</div>
                <div class="txn-time">${dateStr}</div>
              </div>
            </div>
            <div class="txn-right">
              <div class="txn-amt ${amtColor}">${sign}₹${entry.amount.toLocaleString('en-IN')}</div>
              <div class="txn-actions" style="align-items:center;">${actionButtons}</div>
            </div>
          </div>`;
        });
      }
      resultBox.innerHTML = html;
    }

    function triggerTotalView() { 
      currentViewType = 'all'; document.getElementById('searchInput').value = ''; 
      document.getElementById('filterCategory').value = 'ALL'; document.getElementById('filterMode').value = 'ALL';
      document.getElementById('monthPicker').value = ''; refreshView(); 
    }

    function triggerMonthlyView() { currentViewType = document.getElementById('monthPicker').value ? 'monthly' : 'all'; refreshView(); }
    function showTotal() { renderTable(ledger, getT('txtAllTime')); }
    function showMonthly() {
      const selMonth = document.getElementById('monthPicker').value; if (!selMonth) return;
      const [year, month] = selMonth.split('-');
      const monthlyEntries = ledger.filter(e => { const d = new Date(e.date); return d.getMonth() + 1 === parseInt(month) && d.getFullYear() === parseInt(year); });
      const monthName = new Date(parseInt(year), parseInt(month) - 1).toLocaleString(lang==='ta'?'ta-IN':'en-US', { month: 'short', year: 'numeric' });
      renderTable(monthlyEntries, `${monthName} ${getT('txtReport')}`);
    }
    
    function refreshView() { 
      updateHeaderBalance(); 
      checkPlannedAlerts(); // Triggers the pulse engine
      currentViewType === 'all' ? showTotal() : showMonthly(); 
    }
    
    function showToast(msg) {
      const toast = document.createElement('div'); toast.textContent = msg;
      Object.assign(toast.style, { position: 'fixed', bottom: '40px', left: '50%', transform: 'translateX(-50%)', background: 'white', color: 'black', padding: '14px 28px', borderRadius: '100px', zIndex: '1000', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', transition: 'opacity 0.3s', fontSize: '15px', fontWeight: '700' });
      document.body.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
    }

    applyLanguageUI(); initFolders(); triggerTotalView();
  </script>
</body>
</html>
